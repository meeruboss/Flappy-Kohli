<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kohli Fly</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #11151c;
      --paper: #f7efe2;
      --blue: #1f4fa3;
      --orange: #f36f21;
      --gold: #f6c44f;
      --grass: #287b46;
      --shadow: rgba(9, 12, 18, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 12%, rgba(246, 196, 79, 0.28), transparent 28%),
        linear-gradient(135deg, #0c1930 0%, #101821 48%, #1c382f 100%);
      color: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .shell {
      width: min(100vw, 560px);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 16px;
      gap: 12px;
    }

    header,
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 40px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .tag {
      color: rgba(247, 239, 226, 0.74);
      font-size: 13px;
      font-weight: 600;
    }

    .scoreboard {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
    }

    .scorebox {
      min-width: 56px;
      border: 1px solid rgba(247, 239, 226, 0.24);
      border-radius: 8px;
      padding: 7px 10px;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 22px var(--shadow);
    }

    .game-wrap {
      position: relative;
      min-height: 0;
      border: 1px solid rgba(247, 239, 226, 0.26);
      border-radius: 8px;
      overflow: hidden;
      background: #5bb7db;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 580px;
      touch-action: manipulation;
